<!DOCTYPE html>
<html lang="uz">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IT House - Kirish/Chiqish</title>
    <link rel="icon" type="image/png" href="{% static 'img/sklatlogo.png' %}">
    <link rel="apple-touch-icon" sizes="512x512" href="{% static 'img/sklatlogo.png' %}">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" id="themeColor" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            overflow: hidden;
        }
        .kiosk-container {
            width: 100%;
            max-width: 480px;
            padding: 24px;
            text-align: center;
        }
        .brand {
            margin-bottom: 40px;
        }
        .brand img {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }
        .brand h1 {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .brand p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin: 4px 0 0;
            font-weight: 500;
        }
        .clock-display {
            margin-bottom: 40px;
        }
        .clock-display .time {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }
        .clock-display .date {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            font-weight: 500;
        }
        .clock-display .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 6px 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 50px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }
        .clock-display .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .kiosk-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }
        .kiosk-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 28px 24px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }
        .kiosk-btn:active { transform: scale(0.97); }
        .kiosk-btn i { font-size: 32px; }
        .kiosk-btn small {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.8;
            display: block;
            margin-top: 2px;
        }
        .kiosk-btn .btn-text { text-align: left; }
        .btn-checkin {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
        }
        .btn-checkin:hover { box-shadow: 0 12px 40px rgba(16, 185, 129, 0.5); transform: translateY(-2px); }
        .btn-checkout {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
        }
        .btn-checkout:hover { box-shadow: 0 12px 40px rgba(239, 68, 68, 0.5); transform: translateY(-2px); }
        .kiosk-footer {
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            font-weight: 500;
        }
        .kiosk-footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
        .kiosk-footer a:hover { color: rgba(255,255,255,0.8); }
        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        .employees-count {
            margin-top: 24px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .employees-count i { margin-right: 6px; color: rgba(99, 102, 241, 0.6); }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>
    <div class="kiosk-container" style="position:relative;z-index:1;">
        <div class="brand">
            <img src="{% static 'img/sklatlogo.png' %}" alt="IT House">
            <h1>IT House</h1>
            <p>Face Recognition Attendance</p>
        </div>

        <div class="clock-display">
            <div class="time" id="currentTime">--:--</div>
            <div class="date" id="currentDate"></div>
            <div class="status">
                <span class="dot"></span>
                <span id="statusText">Tizim faol</span>
            </div>
        </div>

        <div class="kiosk-buttons">
            <a href="{% url 'checkin' %}" class="kiosk-btn btn-checkin" id="checkinBtn">
                <i class="fas fa-sign-in-alt"></i>
                <div class="btn-text">
                    Kirish
                    <small>Ishga kelishni qayd etish</small>
                </div>
            </a>
            <a href="{% url 'checkout' %}" class="kiosk-btn btn-checkout" id="checkoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <div class="btn-text">
                    Chiqish
                    <small>Ishdan ketishni qayd etish</small>
                </div>
            </a>
        </div>

        <div class="employees-count">
            <i class="fas fa-users"></i> {{ employees|length }} ta xodim
        </div>

        <div class="kiosk-footer">
            &copy; {% now "Y" %} <a href="{% url 'dashboard' %}">IT House Face ID</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const timeEl = document.getElementById('currentTime');
            const dateEl = document.getElementById('currentDate');

            const days = ['Yakshanba', 'Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba'];
            const months = ['Yanvar', 'Fevral', 'Mart', 'Aprel', 'May', 'Iyun', 'Iyul', 'Avgust', 'Sentabr', 'Oktabr', 'Noyabr', 'Dekabr'];

            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                timeEl.textContent = h + ':' + m;
                dateEl.textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear() + ', ' + days[now.getDay()];
            }
            updateClock();
            setInterval(updateClock, 1000);

            const particles = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                particles.appendChild(p);
            }
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{% static 'js/service-worker.js' %}");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Kirish - IT House Face ID</title>
    <link rel="icon" type="image/png" href="{% static 'img/sklatlogo.png' %}">
    <link rel="apple-touch-icon" sizes="512x512" href="{% static 'img/sklatlogo.png' %}">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: loginFadeIn 0.5s ease-out;
        }
        @keyframes loginFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-brand .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }
        .login-brand h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin: 0 0 4px;
            letter-spacing: -0.3px;
        }
        .login-brand p {
            font-size: 13px;
            color: #94a3b8;
            margin: 0;
            font-weight: 500;
        }
        .login-brand p i {
            color: #667eea;
            margin-right: 4px;
        }
        .form-floating-custom {
            margin-bottom: 18px;
        }
        .form-floating-custom label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }
        .form-floating-custom .input-group {
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }
        .form-floating-custom .input-group:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
            background: #fff;
        }
        .form-floating-custom .input-group-text {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            padding: 0 0 0 14px;
        }
        .form-floating-custom .form-control {
            border: none;
            background: transparent;
            padding: 12px 14px 12px 8px;
            font-size: 15px;
            color: #1e293b;
            box-shadow: none !important;
            height: auto;
        }
        .form-floating-custom .form-control::placeholder {
            color: #94a3b8;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        .login-btn:hover {
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
            transform: translateY(-1px);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }
        .login-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .login-error i {
            font-size: 16px;
            flex-shrink: 0;
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 24px;
                border-radius: 20px;
            }
            .login-brand .brand-icon {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
            .login-brand h1 {
                font-size: 19px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-icon">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h1>Xodimlar davomat tizimi</h1>
            <p><i class="fas fa-face-smile"></i> Face Recognition</p>
        </div>

        {% if form.non_field_errors %}
            {% for error in form.non_field_errors %}
                <div class="login-error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <div class="form-floating-custom">
                <label for="{{ form.username.id_for_label }}"><i class="far fa-user"></i> Login</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="far fa-user"></i></span>
                    <input type="text" class="form-control" id="{{ form.username.id_for_label }}"
                           name="{{ form.username.html_name }}" required autofocus
                           placeholder="Loginni kiriting" value="{{ form.username.value|default:'' }}">
                </div>
            </div>

            <div class="form-floating-custom">
                <label for="{{ form.password.id_for_label }}"><i class="fas fa-lock"></i> Parol</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="{{ form.password.id_for_label }}"
                           name="{{ form.password.html_name }}" required
                           placeholder="Parolni kiriting">
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-right-to-bracket"></i>
                TIZIMGA KIRISH
            </button>
        </form>

        <div class="login-footer">
            &copy; 2024 IT House. Barcha huquqlar himoyalangan.
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            {% if messages %}
                {% for message in messages %}
                    showToast("{{ message|escapejs }}", "{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}success{% endif %}");
                {% endfor %}
            {% endif %}
        });

        function showToast(message, type, duration) {
            duration = duration || 4000;
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            const toast = document.createElement('div');
            toast.className = 'toast-item toast-' + type;
            toast.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i><span>' + message + '</span><button class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.classList.add('toast-out');
                setTimeout(function() { toast.remove(); }, 300);
            }, duration);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{% static 'js/service-worker.js' %}");
        }
    </script>
</body>
</html>
